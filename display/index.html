<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LickMe Display Wall</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .screen-canvas {
            flex: 1;
            height: 100%;
            border: none;
        }

        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: monospace;
            font-size: 24px;
        }

        #artwork-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #fff;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.4;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 10px 14px;
            border-radius: 4px;
            max-width: 420px;
        }

        #artwork-info .artwork-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        #artwork-info .artwork-detail {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <div id="status"></div>
    <div id="artwork-info"></div>
    <div id="container">
        <canvas id="canvas1" class="screen-canvas"></canvas>
        <canvas id="canvas2" class="screen-canvas"></canvas>
        <canvas id="canvas3" class="screen-canvas"></canvas>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- Shared config -->
    <script src="../shared/firebase-config.private.js"></script>
    <script src="../shared/firebase-config.js"></script>

    <script>
        // Database references (set after auth)
        let database;
        let currentArtworkRef;

        // Canvas setup
        const canvases = [
            document.getElementById('canvas1'),
            document.getElementById('canvas2'),
            document.getElementById('canvas3')
        ];
        const contexts = canvases.map(c => c.getContext('2d'));

        const loadingEl = document.getElementById('loading');
        const statusEl = document.getElementById('status');

        // State
        const pixelSize = CONFIG.PIXEL_SIZE;
        let currentArtworkIndex = 0;
        let artworkMetadata = [];
        let currentImages = [null, null, null];
        let isMaster = false;
        let lastArtworkChangeTime = Date.now();

        // Color sampling canvases for each screen
        let colorSampleCanvases = [null, null, null];
        let colorSampleCtxs = [null, null, null];

        // Per-screen physics state
        const screenState = [
            { localPixels: new Map(), dripPixels: new Map(), growthQueue: [], drips: [], puddleHeights: new Map(), isGrowing: false },
            { localPixels: new Map(), dripPixels: new Map(), growthQueue: [], drips: [], puddleHeights: new Map(), isGrowing: false },
            { localPixels: new Map(), dripPixels: new Map(), growthQueue: [], drips: [], puddleHeights: new Map(), isGrowing: false }
        ];

        // Sample color from an image at given coordinates (in canvas space)
        function sampleColor(screenIndex, x, y) {
            const sampleCtx = colorSampleCtxs[screenIndex];
            const sampleCanvas = colorSampleCanvases[screenIndex];
            const canvas = canvases[screenIndex];

            if (!sampleCtx || !sampleCanvas) {
                return { r: 128, g: 128, b: 128 };
            }
            try {
                const sampleX = Math.floor((x / canvas.width) * sampleCanvas.width);
                const sampleY = Math.floor((y / canvas.height) * sampleCanvas.height);
                const pixel = sampleCtx.getImageData(sampleX, sampleY, 1, 1).data;
                return { r: pixel[0], g: pixel[1], b: pixel[2] };
            } catch (e) {
                return { r: 128, g: 128, b: 128 };
            }
        }

        // Resize canvases
        function resizeCanvases() {
            const containerWidth = window.innerWidth;
            const containerHeight = window.innerHeight;

            // Divide the space as 1:2:1 ratio
            const totalParts = 4;
            const sideCanvasWidth = containerWidth / totalParts;
            const middleCanvasWidth = sideCanvasWidth * 2;

            canvases.forEach((canvas, i) => {
                const width = i === 1 ? middleCanvasWidth : sideCanvasWidth;
                canvas.width = width;
                canvas.height = containerHeight;
                canvas.style.width = `${width}px`;
                canvas.style.height = `${containerHeight}px`;

                if (currentImages[i]) {
                    contexts[i].drawImage(currentImages[i], 0, 0, canvas.width, canvas.height);
                }
            });
        }

        // Load artwork metadata from API
        async function loadArtworkMetadata() {
            const metadata = [];

            for (const artworkSet of CONFIG.ARTWORK_SETS) {
                const setImages = [];
                for (const url of artworkSet) {
                    try {
                        if (url.match(/\.(png|jpg|jpeg|gif|webp)$/i)) {
                            setImages.push({
                                name: `Artwork ${metadata.length + 1}`,
                                image: url
                            });
                        } else {
                            const response = await fetch(url);
                            if (response.ok) {
                                const data = await response.json();
                                setImages.push({
                                    name: data.name,
                                    image: data.image_url
                                });
                            }
                        }
                    } catch (e) {
                        console.warn('Failed to load artwork:', url);
                    }
                }
                if (setImages.length === 3) {
                    metadata.push(setImages);
                }
            }
            return metadata;
        }

        // Build reverse lookup: collection number → artifact index
        // ARTWORK_TO_ARTIFACT maps artifact index → collection number,
        // so we invert it to go from artwork set index → artifact.
        const collectionToArtifact = {};
        CONFIG.ARTWORK_TO_ARTIFACT.forEach((collectionNum, artifactIndex) => {
            if (collectionNum != null) {
                // Artwork set index is collection number - 1 (0-indexed)
                collectionToArtifact[collectionNum - 1] = artifactIndex;
            }
        });

        // Update artwork info overlay
        function updateArtworkInfo(index) {
            const infoEl = document.getElementById('artwork-info');
            const artifactIndex = collectionToArtifact[index];
            const artifact = artifactIndex != null ? CONFIG.ARTIFACTS[artifactIndex] : null;
            if (!artifact) {
                infoEl.style.display = 'none';
                return;
            }
            infoEl.style.display = '';

            const lines = [];
            lines.push(`<div class="artwork-title">${artifact.title}</div>`);
            if (artifact.date) lines.push(`<div class="artwork-detail">${artifact.date}</div>`);
            if (artifact.material && artifact.material.length > 0) lines.push(`<div class="artwork-detail">${artifact.material.join(', ')}</div>`);
            if (artifact.dimensions) lines.push(`<div class="artwork-detail">${artifact.dimensions}</div>`);
            if (artifact.relatedProduction) lines.push(`<div class="artwork-detail">${artifact.relatedProduction}</div>`);
            if (artifact.credit) lines.push(`<div class="artwork-detail">${artifact.credit}</div>`);
            if (artifact.number) lines.push(`<div class="artwork-detail">#${artifact.number}</div>`);

            infoEl.innerHTML = lines.join('');
        }

        // Load and display current artwork image on all canvases
        function loadArtworkImage(index) {
            if (index < 0 || index >= artworkMetadata.length) return;

            updateArtworkInfo(index);

            const artworkSet = artworkMetadata[index];
            if (!artworkSet || artworkSet.length !== 3) return;

            canvases.forEach((canvas, i) => {
                const artwork = artworkSet[i];
                if (!artwork || !artwork.image) return;

                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = artwork.image;
                img.onload = () => {
                    currentImages[i] = img;
                    contexts[i].drawImage(img, 0, 0, canvas.width, canvas.height);

                    // Create color sampling canvas
                    colorSampleCanvases[i] = document.createElement('canvas');
                    colorSampleCanvases[i].width = img.width;
                    colorSampleCanvases[i].height = img.height;
                    colorSampleCtxs[i] = colorSampleCanvases[i].getContext('2d');
                    colorSampleCtxs[i].drawImage(img, 0, 0);
                };
                img.onerror = () => {
                    currentImages[i] = null;
                    colorSampleCanvases[i] = null;
                    colorSampleCtxs[i] = null;
                    contexts[i].fillStyle = '#2a2a2a';
                    contexts[i].fillRect(0, 0, canvas.width, canvas.height);
                };
            });
        }

        // Clear all pixels for all screens
        function clearAllPixels() {
            screenState.forEach((state, i) => {
                state.localPixels.clear();
                state.dripPixels.clear();
                state.growthQueue.length = 0;
                state.drips.length = 0;
                state.puddleHeights.clear();
                state.isGrowing = false;
            });
            canvases.forEach((canvas, i) => {
                if (currentImages[i]) {
                    contexts[i].drawImage(currentImages[i], 0, 0, canvas.width, canvas.height);
                } else {
                    contexts[i].fillStyle = '#2a2a2a';
                    contexts[i].fillRect(0, 0, canvas.width, canvas.height);
                }
            });
        }

        // Add a pixel locally for a given screen (no Firebase sync)
        function addPixel(screenIndex, x, y, color = null) {
            const canvas = canvases[screenIndex];
            const state = screenState[screenIndex];
            const snappedX = Math.floor(x / pixelSize) * pixelSize;
            const snappedY = Math.floor(y / pixelSize) * pixelSize;
            const key = `${snappedX}_${snappedY}`;

            if (snappedX < 0 || snappedX >= canvas.width || snappedY < 0 || snappedY >= canvas.height) {
                return false;
            }

            if (state.localPixels.has(key)) return false;

            const now = Date.now();
            const pixelColor = color || sampleColor(screenIndex, snappedX, snappedY);

            state.localPixels.set(key, { x: snappedX, y: snappedY, r: pixelColor.r, g: pixelColor.g, b: pixelColor.b, createdAt: now });

            return true;
        }

        // Fungus growth algorithm for a given screen
        function growFungus(screenIndex) {
            const canvas = canvases[screenIndex];
            const state = screenState[screenIndex];

            if (state.growthQueue.length === 0) {
                state.isGrowing = false;
                return;
            }

            const batchSize = 40;
            for (let i = 0; i < batchSize && state.growthQueue.length > 0; i++) {
                const { x, y, centerX, centerY, maxDistance, color } = state.growthQueue.shift();

                const directions = [
                    { dx: pixelSize, dy: 0 }, { dx: -pixelSize, dy: 0 },
                    { dx: 0, dy: pixelSize }, { dx: 0, dy: -pixelSize },
                    { dx: pixelSize, dy: pixelSize }, { dx: -pixelSize, dy: -pixelSize },
                    { dx: pixelSize, dy: -pixelSize }, { dx: -pixelSize, dy: pixelSize }
                ];

                // Shuffle directions for organic look
                for (let j = directions.length - 1; j > 0; j--) {
                    const k = Math.floor(Math.random() * (j + 1));
                    [directions[j], directions[k]] = [directions[k], directions[j]];
                }

                for (const { dx, dy } of directions) {
                    const newX = x + dx;
                    const newY = y + dy;

                    if (newX < 0 || newX >= canvas.width || newY < 0 || newY >= canvas.height) continue;

                    const key = `${newX}_${newY}`;
                    if (state.localPixels.has(key)) continue;

                    const distance = Math.sqrt(Math.pow(newX - centerX, 2) + Math.pow(newY - centerY, 2));
                    if (distance > maxDistance) continue;

                    const orthogonalNeighbors = [
                        `${newX + pixelSize}_${newY}`,
                        `${newX - pixelSize}_${newY}`,
                        `${newX}_${newY + pixelSize}`,
                        `${newX}_${newY - pixelSize}`
                    ].filter(k => state.localPixels.has(k)).length;

                    if (orthogonalNeighbors > 1 && Math.random() < 0.5) continue;

                    if (Math.random() < 0.4 && addPixel(screenIndex, newX, newY, color)) {
                        if (Math.random() < 0.75) {
                            state.growthQueue.push({ x: newX, y: newY, centerX, centerY, maxDistance, color });
                        }
                    }
                }
            }

            requestAnimationFrame(() => growFungus(screenIndex));
        }

        // Find edge pixels for a given screen
        function findEdgePixels(screenIndex) {
            const state = screenState[screenIndex];
            const edgePixels = [];
            state.localPixels.forEach((pixel, key) => {
                const neighbors = [
                    `${pixel.x + pixelSize}_${pixel.y}`,
                    `${pixel.x - pixelSize}_${pixel.y}`,
                    `${pixel.x}_${pixel.y + pixelSize}`,
                    `${pixel.x}_${pixel.y - pixelSize}`
                ];
                if (neighbors.some(nKey => !state.localPixels.has(nKey))) {
                    edgePixels.push(pixel);
                }
            });
            return edgePixels;
        }

        // Update drips for a given screen - full sand physics
        function updateDrips(screenIndex) {
            const canvas = canvases[screenIndex];
            const state = screenState[screenIndex];
            const { localPixels, dripPixels, drips } = state;

            // Spawn drips from bottom edges
            if (Math.random() < 0.02 && localPixels.size > 10) {
                const edgePixels = findEdgePixels(screenIndex);
                const bottomEdges = edgePixels.filter(p => {
                    const below = `${p.x}_${p.y + pixelSize}`;
                    return !localPixels.has(below) && p.y < canvas.height - 100;
                });

                if (bottomEdges.length > 0) {
                    const dripSource = bottomEdges[Math.floor(Math.random() * bottomEdges.length)];
                    drips.push({
                        x: dripSource.x,
                        y: dripSource.y + pixelSize,
                        speed: 6 + Math.random() * 4,
                        color: { r: dripSource.r || 128, g: dripSource.g || 128, b: dripSource.b || 128 },
                        payload: 70 + Math.floor(Math.random() * 50),
                        pooling: false,
                        createdAt: Date.now()
                    });
                }
            }

            // Update existing drips
            const floorY = Math.floor(canvas.height / pixelSize) * pixelSize - pixelSize;

            for (let i = drips.length - 1; i >= 0; i--) {
                const drip = drips[i];
                drip.y += drip.speed;

                const snappedX = Math.floor(drip.x / pixelSize) * pixelSize;
                const snappedY = Math.floor(drip.y / pixelSize) * pixelSize;

                const currentKey = `${snappedX}_${snappedY}`;
                const belowKey = `${snappedX}_${snappedY + pixelSize}`;
                const atFloor = snappedY >= floorY;
                const hitPile = dripPixels.has(currentKey) || dripPixels.has(belowKey);

                if (!drip.trail) drip.trail = [];
                drip.trail.push({ x: snappedX, y: snappedY });
                if (drip.trail.length > 50) drip.trail.shift();

                if (atFloor || hitPile) {
                    drip.pooling = true;
                    drip.poolX = snappedX;
                    drip.y = floorY;
                }

                if (drip.pooling && drip.payload > 0) {
                    const color = drip.color;
                    const now = Date.now();
                    const grainsPerFrame = 3 + Math.floor(Math.random() * 3);

                    for (let p = 0; p < grainsPerFrame && drip.payload > 0; p++) {
                        drip.payload--;

                        let settleX = drip.poolX;
                        let settleY = floorY;

                        while (settleY >= 0 && dripPixels.has(`${settleX}_${settleY}`)) {
                            settleY -= pixelSize;
                        }

                        // Flow downhill
                        for (let roll = 0; roll < 50; roll++) {
                            const leftX = settleX - pixelSize;
                            const rightX = settleX + pixelSize;

                            let leftY = floorY;
                            if (leftX >= 0) {
                                while (leftY >= 0 && dripPixels.has(`${leftX}_${leftY}`)) leftY -= pixelSize;
                            } else {
                                leftY = -999;
                            }

                            let rightY = floorY;
                            if (rightX < canvas.width) {
                                while (rightY >= 0 && dripPixels.has(`${rightX}_${rightY}`)) rightY -= pixelSize;
                            } else {
                                rightY = -999;
                            }

                            if (Math.random() < 0.05) {
                                break;
                            } else if (Math.random() < 0.1 && (leftY > settleY || rightY > settleY)) {
                                if (leftY > settleY && rightY > settleY) {
                                    if (Math.random() < 0.3) { settleX = leftX; settleY = leftY; }
                                    else { settleX = rightX; settleY = rightY; }
                                } else if (leftY > settleY) { settleX = leftX; settleY = leftY; }
                                else { settleX = rightX; settleY = rightY; }
                            } else if (leftY > settleY && leftY >= rightY) {
                                settleX = leftX;
                                settleY = leftY;
                            } else if (rightY > settleY) {
                                settleX = rightX;
                                settleY = rightY;
                            } else {
                                break;
                            }
                        }

                        const settleKey = `${settleX}_${settleY}`;
                        if (settleY >= 0 && !dripPixels.has(settleKey)) {
                            dripPixels.set(settleKey, { x: settleX, y: settleY, r: color.r, g: color.g, b: color.b, createdAt: now });
                        }
                    }

                    if (drip.payload <= 0) {
                        drips.splice(i, 1);
                    }
                }
            }
        }

        // Spread effect from a touch point on a given screen
        function triggerSpread(screenIndex, clientX, clientY) {
            const canvas = canvases[screenIndex];
            const state = screenState[screenIndex];
            const centerX = Math.floor(clientX / pixelSize) * pixelSize;
            const centerY = Math.floor(clientY / pixelSize) * pixelSize;

            const touchColor = sampleColor(screenIndex, centerX, centerY);
            const maxDistance = 120;

            // Find edge pixels near the touch point to expand from
            const edgePixelsNearby = [];
            for (const [key, pixel] of state.localPixels) {
                const distance = Math.sqrt(Math.pow(pixel.x - centerX, 2) + Math.pow(pixel.y - centerY, 2));
                if (distance < 80) {
                    const neighbors = [
                        `${pixel.x + pixelSize}_${pixel.y}`,
                        `${pixel.x - pixelSize}_${pixel.y}`,
                        `${pixel.x}_${pixel.y + pixelSize}`,
                        `${pixel.x}_${pixel.y - pixelSize}`
                    ];
                    const hasEmptyNeighbor = neighbors.some(n => !state.localPixels.has(n));
                    if (hasEmptyNeighbor) {
                        edgePixelsNearby.push(pixel);
                    }
                }
            }

            if (edgePixelsNearby.length > 0) {
                const expandCount = Math.min(edgePixelsNearby.length, 10);
                for (let i = 0; i < expandCount; i++) {
                    const pixel = edgePixelsNearby[Math.floor(Math.random() * edgePixelsNearby.length)];
                    state.growthQueue.push({
                        x: pixel.x,
                        y: pixel.y,
                        centerX: pixel.x,
                        centerY: pixel.y,
                        maxDistance,
                        color: touchColor
                    });
                }
            } else {
                addPixel(screenIndex, centerX, centerY, touchColor);

                const seedCount = 8;
                for (let i = 0; i < seedCount; i++) {
                    const angle = (Math.PI * 2 / seedCount) * i + Math.random() * 0.3;
                    const dist = pixelSize * (1 + Math.floor(Math.random() * 3));
                    const x = centerX + Math.cos(angle) * dist;
                    const y = centerY + Math.sin(angle) * dist;

                    if (addPixel(screenIndex, x, y, touchColor)) {
                        state.growthQueue.push({
                            x: Math.floor(x / pixelSize) * pixelSize,
                            y: Math.floor(y / pixelSize) * pixelSize,
                            centerX,
                            centerY,
                            maxDistance,
                            color: touchColor
                        });
                    }
                }
            }

            if (!state.isGrowing && state.growthQueue.length > 0) {
                state.isGrowing = true;
                growFungus(screenIndex);
            }
        }

        // Drawing loop
        function draw() {
            const currentTime = Date.now();

            canvases.forEach((canvas, screenIndex) => {
                const ctx = contexts[screenIndex];
                const state = screenState[screenIndex];

                // Update drips
                updateDrips(screenIndex);

                // Draw base image
                if (currentImages[screenIndex]) {
                    ctx.drawImage(currentImages[screenIndex], 0, 0, canvas.width, canvas.height);
                }

                // Draw pixels - fade from white to sampled color
                state.localPixels.forEach((pixel, key) => {
                    const age = currentTime - pixel.createdAt;
                    const r = pixel.r || 128;
                    const g = pixel.g || 128;
                    const b = pixel.b || 128;

                    if (age < CONFIG.WHITE_TO_BLACK_MS) {
                        const ratio = age / CONFIG.WHITE_TO_BLACK_MS;
                        const pr = Math.floor(255 - (ratio * (255 - r)));
                        const pg = Math.floor(255 - (ratio * (255 - g)));
                        const pb = Math.floor(255 - (ratio * (255 - b)));
                        ctx.fillStyle = `rgb(${pr}, ${pg}, ${pb})`;
                        ctx.fillRect(pixel.x, pixel.y, pixelSize, pixelSize);
                    } else {
                        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                        ctx.fillRect(pixel.x, pixel.y, pixelSize, pixelSize);
                    }
                });

                // Draw drip pixels
                state.dripPixels.forEach((pixel, key) => {
                    const age = currentTime - pixel.createdAt;
                    const r = pixel.r || 128;
                    const g = pixel.g || 128;
                    const b = pixel.b || 128;

                    if (age < CONFIG.WHITE_TO_BLACK_MS) {
                        const ratio = age / CONFIG.WHITE_TO_BLACK_MS;
                        const pr = Math.floor(255 - (ratio * (255 - r)));
                        const pg = Math.floor(255 - (ratio * (255 - g)));
                        const pb = Math.floor(255 - (ratio * (255 - b)));
                        ctx.fillStyle = `rgb(${pr}, ${pg}, ${pb})`;
                        ctx.fillRect(pixel.x, pixel.y, pixelSize, pixelSize);
                    } else {
                        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                        ctx.fillRect(pixel.x, pixel.y, pixelSize, pixelSize);
                    }
                });

                // Draw active drip trails
                state.drips.forEach(drip => {
                    if (drip.trail && drip.color) {
                        const r = drip.color.r;
                        const g = drip.color.g;
                        const b = drip.color.b;
                        drip.trail.forEach((pos, idx) => {
                            const alpha = (idx / drip.trail.length);
                            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                            ctx.fillRect(pos.x, pos.y, pixelSize, pixelSize);
                        });
                    }
                });
            });

            // Update status
            const totalPixels = screenState.reduce((sum, s) => sum + s.localPixels.size, 0);
            const totalDrips = screenState.reduce((sum, s) => sum + s.dripPixels.size, 0);
            statusEl.textContent = `Artwork ${currentArtworkIndex + 1}/${artworkMetadata.length} | Pixels: ${totalPixels} | Drips: ${totalDrips}${isMaster ? ' (Master)' : ''}`;

            requestAnimationFrame(draw);
        }

        // Setup Firebase listeners for touch events from each screen
        // Routes touches to the correct display canvas based on SCREEN_CONFIGS imageIndex
        function setupScreenListeners() {
            const connectionTime = Date.now();

            CONFIG.SCREEN_CONFIGS.forEach((screenCfg, i) => {
                const screenKey = `screen${i + 1}`;
                const touchesRef = database.ref(`screens/${screenKey}/touches`);
                const displayCanvasIndex = screenCfg.imageIndex; // Which of the 3 display canvases

                // Listen for new touches - only process ones after we connected
                touchesRef.on('child_added', (snapshot) => {
                    const touch = snapshot.val();
                    if (!touch || touch.t < connectionTime - 1000) return;

                    // Touch nx/ny are already in full-image normalized space
                    // Convert to display canvas pixel coordinates
                    const canvas = canvases[displayCanvasIndex];
                    const x = touch.nx * canvas.width;
                    const y = touch.ny * canvas.height;
                    triggerSpread(displayCanvasIndex, x, y);
                });

                // Listen for full clear (on artwork change)
                const screenRef = database.ref(`screens/${screenKey}`);
                screenRef.on('value', (snapshot) => {
                    if (!snapshot.exists() || !snapshot.child('touches').exists()) {
                        const state = screenState[displayCanvasIndex];
                        state.localPixels.clear();
                        state.dripPixels.clear();
                        state.growthQueue.length = 0;
                        state.drips.length = 0;
                        state.puddleHeights.clear();
                        state.isGrowing = false;
                    }
                });
            });
        }

        // Master cycling logic (display can also be master)
        function setupMasterCycling() {
            const masterRef = database.ref('master');

            masterRef.transaction((current) => {
                if (!current || Date.now() - current.lastHeartbeat > 10000) {
                    return {
                        screenId: 'display',
                        lastHeartbeat: firebase.database.ServerValue.TIMESTAMP
                    };
                }
                return;
            }).then((result) => {
                if (result.committed && result.snapshot.val()?.screenId === 'display') {
                    isMaster = true;
                    startMasterCycle();
                }
            });

            // Heartbeat if we're master
            setInterval(() => {
                if (isMaster) {
                    masterRef.update({
                        lastHeartbeat: firebase.database.ServerValue.TIMESTAMP
                    });
                }
            }, 5000);
        }

        // Query Objkt.com for latest sale event
        async function getLatestSaleEvent() {
            const query = `
                query {
                    event(
                        where: {
                            marketplace_event_type: {
                                _in: ["list_buy", "english_auction_settle", "dutch_auction_buy", "offer_accept", "offer_floor_accept"]
                            }
                        }
                        order_by: {timestamp: desc}
                        limit: 1
                    ) {
                        id
                        timestamp
                        ophash
                        price_xtz
                        marketplace_event_type
                    }
                }
            `;

            try {
                const response = await fetch(CONFIG.OBJKT_GRAPHQL_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!response.ok) {
                    console.error('Objkt API error:', response.status);
                    return null;
                }

                const data = await response.json();
                const event = data?.data?.event?.[0] || null;

                if (event) {
                    console.log('Latest sale event:', {
                        id: event.id,
                        type: event.marketplace_event_type,
                        price: event.price_xtz ? `${event.price_xtz} XTZ` : 'N/A',
                        timestamp: new Date(event.timestamp).toLocaleString(),
                        ophash: event.ophash
                    });
                }

                return event;
            } catch (error) {
                console.error('Failed to fetch latest sale event:', error);
                return null;
            }
        }

        // Advance to next artwork via Firebase (used by master cycle and debug hotkey)
        function cycleToArtwork(nextIndex) {
            currentArtworkRef.set({
                index: nextIndex,
                lastChanged: firebase.database.ServerValue.TIMESTAMP
            });

            // Clear touches in Firebase
            database.ref('screens/screen1/touches').remove();
            database.ref('screens/screen2/touches').remove();
            database.ref('screens/screen3/touches').remove();
            database.ref('screens/screen4/touches').remove();

            lastArtworkChangeTime = Date.now();
        }

        function startMasterCycle() {
            let lastEventId = null;
            let isFirstPoll = true;
            const AUTO_CYCLE_MS = 10 * 60 * 1000; // 10 minutes

            setInterval(async () => {
                if (!isMaster || artworkMetadata.length === 0) return;

                // Auto-cycle if no change for 10 minutes
                if (Date.now() - lastArtworkChangeTime >= AUTO_CYCLE_MS) {
                    console.log('AUTO-CYCLE: No artwork change for 10 minutes, advancing...');
                    const nextIndex = (currentArtworkIndex + 1) % artworkMetadata.length;
                    cycleToArtwork(nextIndex);
                    return;
                }

                const latestEvent = await getLatestSaleEvent();
                if (!latestEvent) return;

                if (isFirstPoll) {
                    lastEventId = latestEvent.id;
                    console.log('Starting artwork cycling on sales. Watching for new events...');
                    isFirstPoll = false;
                    return;
                }

                if (latestEvent.id !== lastEventId) {
                    console.log('NEW SALE DETECTED! Switching artwork...');
                    console.log('   Type:', latestEvent.marketplace_event_type);
                    console.log('   Price:', latestEvent.price_xtz, 'XTZ');
                    console.log('   Event ID:', latestEvent.id);

                    const nextIndex = (currentArtworkIndex + 1) % artworkMetadata.length;
                    cycleToArtwork(nextIndex);

                    lastEventId = latestEvent.id;
                }

            }, CONFIG.OBJKT_POLL_INTERVAL_MS);
        }

        // Setup artwork change listener
        function setupArtworkListener() {
            currentArtworkRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && typeof data.index === 'number') {
                    const safeIndex = data.index % Math.max(1, artworkMetadata.length);
                    if (safeIndex !== currentArtworkIndex) {
                        currentArtworkIndex = safeIndex;
                        lastArtworkChangeTime = Date.now();
                        clearAllPixels();
                        loadArtworkImage(currentArtworkIndex);
                    }
                }
            });
        }

        // Initialize
        async function init() {
            loadingEl.textContent = 'Authenticating...';

            const authSuccess = await initFirebase();
            if (!authSuccess) {
                loadingEl.textContent = 'Error: Authentication failed';
                return;
            }

            database = firebase.database();
            currentArtworkRef = database.ref('currentArtwork');

            setupArtworkListener();

            loadingEl.textContent = 'Loading artworks...';

            resizeCanvases();

            artworkMetadata = await loadArtworkMetadata();

            if (artworkMetadata.length === 0) {
                loadingEl.textContent = 'Error: No artworks loaded';
                return;
            }

            const artworkSnapshot = await currentArtworkRef.once('value');
            const artworkData = artworkSnapshot.val();
            if (artworkData && typeof artworkData.index === 'number') {
                currentArtworkIndex = artworkData.index;
            } else {
                await currentArtworkRef.set({
                    index: 0,
                    lastChanged: firebase.database.ServerValue.TIMESTAMP
                });
            }

            loadArtworkImage(currentArtworkIndex);

            setupScreenListeners();

            setupMasterCycling();

            loadingEl.style.display = 'none';

            draw();
        }

        // Handle resize
        window.addEventListener('resize', resizeCanvases);

        // Debug hotkeys: ArrowRight = next artwork, ArrowLeft = previous artwork
        window.addEventListener('keydown', (e) => {
            if (artworkMetadata.length === 0) return;

            let nextIndex = null;
            if (e.key === 'ArrowRight') {
                nextIndex = (currentArtworkIndex + 1) % artworkMetadata.length;
            } else if (e.key === 'ArrowLeft') {
                nextIndex = (currentArtworkIndex - 1 + artworkMetadata.length) % artworkMetadata.length;
            }

            if (nextIndex !== null) {
                console.log(`DEBUG: Manual artwork switch to ${nextIndex + 1}/${artworkMetadata.length}`);
                cycleToArtwork(nextIndex);
            }
        });

        // Start
        init();
    </script>
